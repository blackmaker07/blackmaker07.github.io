{{ define "main" }}

<div class="container">

  <div class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3">
    {{ .Content }}
  </div>

  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
    {{ .Summary }}
  {{ end }}
</div>

{{ end }}
