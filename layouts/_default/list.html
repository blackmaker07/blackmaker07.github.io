{{ define "main" }}

<div class="container">

  <div class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3">
    {{ .Content }}
  </div>

  <div class="row gx-3">
    <section class="col-sm-9">
      {{ range .Pages }}
      <article class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3 position-relative">
        <header>
          <h3 class="text-primary">
              {{ .LinkTitle }}
          
          </h3>
        </header>
      
      
        {{ .Summary | truncate 360 }}        
      
      
      
        <footer>
          <a class="stretched-link" href="{{ .RelPermalink }}"></a>
        </footer>
      
      </article>
      {{ end }}
    </section>
  
    <aside class="col-sm-3">
      {{ partial "aside.html" . }}
    </aside>
  </div>
  
  </div>

</div>

{{ end }}
