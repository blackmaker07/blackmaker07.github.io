<!-- Neuesten Blogeinträge (3) -->

{{ range ( where .Site.RegularPages "Type" "posts" | first 3 ) }}

<article class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3 position-relative">
  <header>
    <h3 class="text-primary">
        {{ .LinkTitle }}
    
    </h3>
  </header>


  {{ .Summary | truncate 360 }}        
    [ <i class="bi bi-box-arrow-up-right"></i> mehr lesen ... ]



  <footer>
    <a class="stretched-link" href="{{ .RelPermalink }}"></a>
  </footer>

</article>

{{end}}
