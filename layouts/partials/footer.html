<div class="container">
  {{ partial "breadcrumb.html" . }}
  <footer>
    <div class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
      <div class="col-md-4 d-flex align-items-center">
        <!--
        <a href="/" class="mb-3 me-2 mb-md-0 lh-1">
          <i class="bi bi-heart" style="font-size: 1rem;"></i>
        </a>
        -->
        <span class="mb-3 mb-md-0 text-body-secondary">Created by {{ .Site.Title }} · © {{ time.Now | time.Format "Jan 2006" }}</span>
      </div>
      <ul class="nav col-md-4 justify-content-center list-unstyled d-flex mb-3 mb-md-0">
        <li class="ms-3"><a href="{{ .Site.Params.twitter_url }}" data-bs-toggle="tooltip" data-bs-title="Default tooltip" data-bs-placement="top"><i class="bi bi-twitter-x" style="font-size: 1.50rem;"></i></a></li>
        <li class="ms-3"><a href="{{ .Site.Params.github_url }}" data-bs-toggle="tooltip" data-bs-title="Default tooltip" data-bs-placement="top"><i class="bi bi-github" style="font-size: 1.50rem;"></i></a></li>
      </ul>
      <ul id="footer-nav" class="nav col-md-4 justify-content-end d-flex mb-3 mb-md-0">
        {{ with site.Menus.footer }}
        {{ range . }}
        {{ if $.IsMenuCurrent .Menu . }}
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{{ .URL }}">{{ .Name }}</a>
        </li>
        {{ else }}
        <li class="nav-item">
          <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
        </li>
        {{ end }}
        {{ end }}
        {{ end }}
      </ul>
    </div>
  </footer>
</div>
