<div class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3">
    <h4>Beiträge nach Tags</h4>
    {{range $name, $taxonomy := .Site.Taxonomies.tags}} {{ $cnt := .Count }}
    {{ with $.Site.GetPage (printf "/tags/%s" $name) }}
        <div class="tagbutton">
        » <a href={{ .RelPermalink }} class="text-decoration-none">{{ strings.FirstUpper $name }}</a>
      <small><span class="badge text-bg-secondary">{{$cnt}}</span></small>
      
        </div>
    {{end}}
  {{end}}
</div>
