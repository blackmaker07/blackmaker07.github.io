{{ define "main" }}


<div class="container">

  <div class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3">
    {{ .Content }}
  </div>

<div class="row gx-3">
  <section class="col-sm-9">
    <div class="bg-body-tertiary p-3 p-md-4 mb-3 rounded-3">
      <h2>Kontaktformular</h2>
      <form class="row g-4 needs-validation" action="https://formspree.io/f/xknoepjo" method="POST">
        <div class="col-12 col-md-6">
            <input type="text" class="form-control" autocomplete="family-name" id="validation-vorname" value="" name="Vorname"
                placeholder="Vor- und Nachname" required />
            <div class="valid-feedback">Eingabe valid.</div>
        </div>
        <div class="col-12 col-md-6">
            <input type="email" class="form-control" autocomplete="off" id="validation-email" aria-describedby="emailHelp"
                name="email" placeholder="E-Mail Adresse" required />
            <div class="valid-feedback">Eingabe valid.</div>
        </div>

        <div class="col-12">
            <textarea class="form-control" autocomplete="off" id="validation-textarea" style="min-height: 250px"
                placeholder="Ihr Anliegen" name="nachricht" required></textarea>
            <div class="valid-feedback">Eingabe valid.</div>
        </div>

        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="invalidCheck" required />
                <label class="form-check-label small" for="invalidCheck">
                    Ich stimme zu, dass meine Angaben und Daten zur Beantwortung meiner
                    Anfrage gemäß der <a class="link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" href="#">Datenschutzerklärung</a>
                    verarbeitet werden. Meine
                    Einwilligung kann ich jederzeit per E-Mail widerrufen.
                </label>
                <div class="invalid-feedback">Zustimmung erforderlich.</div>
            </div>
        </div>

        <div class="col-12">
            <button class="btn btn-primary" role="button" type="submit">
                Nachricht absenden
            </button>
        </div>
    </form>
    </div>
  </section>

  <aside class="col-sm-3">
    {{ partial "aside.html" . }}
  </aside>
</div>

</div>

{{ end }}
